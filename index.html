<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Now Watching</title>
  <link rel="preconnect" href="https://api.trakt.tv">
  <link rel="preconnect" href="https://api.themoviedb.org">
  <link rel="preconnect" href="https://image.tmdb.org">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 22px; }
    body {
      background: #06060c;
      color: #d4af37;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ── Backdrop ── */
    .backdrop {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      filter: blur(60px) saturate(1.8) brightness(0.5);
      -webkit-filter: blur(60px) saturate(1.8) brightness(0.5);
      transform: scale(1.2);
      -webkit-transform: scale(1.2);
      transition: opacity 1.4s ease;
      z-index: 1;
    }
    .backdrop-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        linear-gradient(to right, rgba(6,6,12,0.92) 0%, rgba(6,6,12,0.55) 40%, rgba(6,6,12,0.3) 60%, rgba(6,6,12,0.7) 100%),
        linear-gradient(to bottom, rgba(6,6,12,0.4) 0%, rgba(6,6,12,0.1) 40%, rgba(6,6,12,0.6) 100%);
      z-index: 2;
    }

    /* ══════════════════════════════════════════════════════
       PLAYING SCREEN — vertical poster-top layout
       ══════════════════════════════════════════════════════ */
    .playing-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 3;
      transition: opacity 0.6s ease;
      overflow: hidden;
    }

    /* ── Poster hero (top portion) ── */
    .poster-col {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      padding-top: 2vh;
    }
    .poster-hero {
      width: 70vw;
      max-width: 680px;
      max-height: 58vh;
      object-fit: contain;
      border-radius: 16px;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.7),
        0 0 0 1px rgba(255,255,255,0.04),
        0 0 80px rgba(229,9,20,0.05);
    }

    /* ── Scrolling info below poster ── */
    .info-col {
      flex: 1;
      min-height: 0;
      width: 95%;
      max-width: 920px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2vh 0 3vh;
      overflow-y: auto;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .info-col::-webkit-scrollbar { display: none; }

    /* ── Now watching badge ── */
    .now-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .now-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #e50914;
      animation: dot-pulse 2s ease-in-out infinite;
      -webkit-animation: dot-pulse 2s ease-in-out infinite;
    }
    @keyframes dot-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    @-webkit-keyframes dot-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .now-text {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: #e50914;
    }

    /* ── Title ── */
    .show-title {
      font-size: 2.4rem;
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.035em;
      text-transform: uppercase;
      text-shadow: 0 4px 30px rgba(0,0,0,0.5);
      margin-bottom: 4px;
    }

    /* ── Tagline ── */
    .tagline {
      font-size: 1rem;
      font-style: italic;
      opacity: 0.35;
      margin-bottom: 12px;
    }

    /* ── Meta chips ── */
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .meta-chip {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .meta-chip.cert {
      border-color: rgba(255,255,255,0.3);
      font-weight: 800;
      font-size: 0.82rem;
      letter-spacing: 0.03em;
    }
    .meta-chip.episode {
      background: rgba(229,9,20,0.15);
      border-color: rgba(229,9,20,0.35);
      color: #ff7b7b;
    }
    .meta-chip.seasons {
      background: rgba(100,50,200,0.12);
      border-color: rgba(100,50,200,0.3);
      color: #c4a0ff;
    }

    /* ══════════════════════════════════════════════════════
       RATINGS — 2x2 grid centered, big and bold
       ══════════════════════════════════════════════════════ */
    .ratings-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
      width: 100%;
    }
    .r-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* Score circle */
    .r-circle {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 0.95rem;
      flex-shrink: 0;
    }
    .r-circle.imdb {
      background: #f5c518;
      color: #000;
    }
    .r-circle.rt {
      background: #FA320A;
      color: #fff;
      font-size: 1.2rem;
    }
    .r-circle.rt.rotten {
      background: #6BC53E;
    }
    .r-circle.meta-good {
      background: #66cc33;
      color: #000;
    }
    .r-circle.meta-mixed {
      background: #ffcc33;
      color: #000;
    }
    .r-circle.meta-bad {
      background: #ff0000;
      color: #fff;
    }
    .r-circle.tmdb-c {
      background: #081c22;
      border: 3px solid #01d277;
      color: #fff;
      font-size: 0.95rem;
    }

    .r-info { display: flex; flex-direction: column; min-width: 0; }
    .r-score {
      font-size: 1.2rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .r-source {
      font-size: 0.62rem;
      font-weight: 600;
      opacity: 0.4;
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .r-sub {
      font-size: 0.58rem;
      font-weight: 500;
      opacity: 0.28;
      margin-top: 1px;
    }

    /* ── Awards + Box Office side by side ── */
    .highlights-row {
      display: flex;
      gap: 8px;
      width: 100%;
      margin-bottom: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .awards-bar {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: linear-gradient(135deg, rgba(245,197,24,0.06) 0%, rgba(245,197,24,0.01) 100%);
      border: 1px solid rgba(245,197,24,0.1);
      border-radius: 8px;
      min-width: 0;
    }
    .awards-icon { font-size: 1rem; flex-shrink: 0; }
    .awards-text {
      font-size: 0.7rem;
      font-weight: 400;
      color: #f5c518;
      opacity: 0.7;
      line-height: 1.2;
    }

    .box-office-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(1,210,119,0.05);
      border: 1px solid rgba(1,210,119,0.1);
      border-radius: 9px;
      flex-shrink: 0;
      margin-bottom: 22px;
    }
    .box-office-label {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.4;
    }
    .box-office-val {
      font-size: 0.95rem;
      font-weight: 800;
      color: #01d277;
    }

    .awards-text-only {
      font-size: 0.85rem;
      font-weight: 500;
      color: #d4af37;
      opacity: 0.8;
      margin-bottom: 14px;
      margin-top: 10px;
      text-align: center;
      line-height: 1.4;
      letter-spacing: 0.02em;
    }

    /* ══════════════════════════════════════════════════════
       PROGRESS BAR
       ══════════════════════════════════════════════════════ */
    .progress-wrap {
      width: 100%;
      margin-bottom: 14px;
    }
    .progress-bar-bg {
      width: 100%;
      height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      -webkit-border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #e50914, #ff5555);
      border-radius: 2px;
      -webkit-border-radius: 2px;
      transition: width 1s linear;
    }
    .progress-times {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      opacity: 0.3;
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
    }

    /* ══════════════════════════════════════════════════════
       DETAILS SECTIONS
       ══════════════════════════════════════════════════════ */
    .summary {
      font-size: 0.9rem;
      line-height: 1.6;
      opacity: 0.5;
      margin-bottom: 16px;
      text-align: center;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .credit-line {
      font-size: 0.9rem;
      opacity: 0.45;
      margin-bottom: 6px;
      text-align: center;
    }
    .credit-line strong { opacity: 1; font-weight: 700; }
    .credit-line .credit-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.5;
      margin-right: 6px;
    }

    .section-label {
      font-size: 0.58rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      opacity: 0.2;
      margin-bottom: 8px;
      margin-top: 12px;
    }

    /* Genre pills */
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
    }
    .pill {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 9px 20px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 500;
      white-space: nowrap;
    }

    /* Cast — 2 column centered */
    .cast-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px 22px;
      width: 100%;
      text-align: left;
    }
    .cast-item {
      font-size: 0.83rem;
      font-weight: 500;
      opacity: 0.6;
      line-height: 1.7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cast-char {
      font-weight: 400;
      opacity: 0.5;
      font-size: 0.7rem;
    }

    /* Network */
    .network-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
      opacity: 0.25;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .network-logo {
      height: 32px;
      filter: brightness(0) invert(1);
      -webkit-filter: brightness(0) invert(1);
      opacity: 0.7;
    }
    .produced-by {
      margin-top: 14px;
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.2;
      text-align: center;
    }
    .produced-label {
      color: #d4af37;
      font-weight: 700;
    }

    /* ══════════════════════════════════════════════════════
       IDLE STATE — ambient aurora display
       ══════════════════════════════════════════════════════ */
    .idle-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 5;
      background: #06060c;
      overflow: hidden;
    }

    /* Floating aurora orbs */
    .idle-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      -webkit-filter: blur(100px);
      opacity: 0;
    }
    .idle-orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(229,9,20,0.3) 0%, transparent 70%);
      animation: orb-float-1 12s ease-in-out infinite;
      -webkit-animation: orb-float-1 12s ease-in-out infinite;
    }
    .idle-orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(80,40,200,0.25) 0%, transparent 70%);
      animation: orb-float-2 15s ease-in-out infinite;
      -webkit-animation: orb-float-2 15s ease-in-out infinite;
    }
    .idle-orb-3 {
      width: 450px; height: 450px;
      background: radial-gradient(circle, rgba(1,180,220,0.18) 0%, transparent 70%);
      animation: orb-float-3 18s ease-in-out infinite;
      -webkit-animation: orb-float-3 18s ease-in-out infinite;
    }
    .idle-orb-4 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(200,60,120,0.2) 0%, transparent 70%);
      animation: orb-float-4 20s ease-in-out infinite;
      -webkit-animation: orb-float-4 20s ease-in-out infinite;
    }

    @keyframes orb-float-1 {
      0%   { transform: translate(-30%, -20%) scale(1);   opacity: 0.6; }
      25%  { transform: translate(10%, -10%) scale(1.15);  opacity: 0.8; }
      50%  { transform: translate(30%, 15%) scale(0.9);   opacity: 0.5; }
      75%  { transform: translate(-10%, 20%) scale(1.1);  opacity: 0.7; }
      100% { transform: translate(-30%, -20%) scale(1);   opacity: 0.6; }
    }
    @-webkit-keyframes orb-float-1 {
      0%   { -webkit-transform: translate(-30%, -20%) scale(1);   opacity: 0.6; }
      25%  { -webkit-transform: translate(10%, -10%) scale(1.15);  opacity: 0.8; }
      50%  { -webkit-transform: translate(30%, 15%) scale(0.9);   opacity: 0.5; }
      75%  { -webkit-transform: translate(-10%, 20%) scale(1.1);  opacity: 0.7; }
      100% { -webkit-transform: translate(-30%, -20%) scale(1);   opacity: 0.6; }
    }
    @keyframes orb-float-2 {
      0%   { transform: translate(40%, 30%) scale(1);    opacity: 0.5; }
      33%  { transform: translate(-20%, 10%) scale(1.2);  opacity: 0.7; }
      66%  { transform: translate(10%, -30%) scale(0.85); opacity: 0.4; }
      100% { transform: translate(40%, 30%) scale(1);    opacity: 0.5; }
    }
    @-webkit-keyframes orb-float-2 {
      0%   { -webkit-transform: translate(40%, 30%) scale(1);    opacity: 0.5; }
      33%  { -webkit-transform: translate(-20%, 10%) scale(1.2);  opacity: 0.7; }
      66%  { -webkit-transform: translate(10%, -30%) scale(0.85); opacity: 0.4; }
      100% { -webkit-transform: translate(40%, 30%) scale(1);    opacity: 0.5; }
    }
    @keyframes orb-float-3 {
      0%   { transform: translate(-40%, 40%) scale(0.9);  opacity: 0.4; }
      50%  { transform: translate(35%, -25%) scale(1.15); opacity: 0.65; }
      100% { transform: translate(-40%, 40%) scale(0.9);  opacity: 0.4; }
    }
    @-webkit-keyframes orb-float-3 {
      0%   { -webkit-transform: translate(-40%, 40%) scale(0.9);  opacity: 0.4; }
      50%  { -webkit-transform: translate(35%, -25%) scale(1.15); opacity: 0.65; }
      100% { -webkit-transform: translate(-40%, 40%) scale(0.9);  opacity: 0.4; }
    }
    @keyframes orb-float-4 {
      0%   { transform: translate(20%, -40%) scale(1);   opacity: 0.35; }
      40%  { transform: translate(-35%, 5%) scale(1.1);  opacity: 0.55; }
      70%  { transform: translate(15%, 35%) scale(0.95); opacity: 0.4; }
      100% { transform: translate(20%, -40%) scale(1);   opacity: 0.35; }
    }
    @-webkit-keyframes orb-float-4 {
      0%   { -webkit-transform: translate(20%, -40%) scale(1);   opacity: 0.35; }
      40%  { -webkit-transform: translate(-35%, 5%) scale(1.1);  opacity: 0.55; }
      70%  { -webkit-transform: translate(15%, 35%) scale(0.95); opacity: 0.4; }
      100% { -webkit-transform: translate(20%, -40%) scale(1);   opacity: 0.35; }
    }

    /* Noise texture overlay for depth */
    .idle-noise {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      opacity: 0.4;
      z-index: 1;
      pointer-events: none;
    }

    /* Content layer */
    .idle-content {
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* Giant clock */
    .idle-clock {
      font-size: 10rem;
      font-weight: 100;
      letter-spacing: 0.06em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.35) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .idle-ampm {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      opacity: 0.2;
      margin-bottom: 20px;
    }
    .idle-date {
      font-size: 1.3rem;
      font-weight: 400;
      opacity: 0.18;
      letter-spacing: 0.08em;
      margin-bottom: 50px;
    }

    /* Divider line */
    .idle-divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      margin-bottom: 40px;
    }

    /* Status text */
    .idle-status {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .idle-status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      animation: idle-dot-blink 3s ease-in-out infinite;
      -webkit-animation: idle-dot-blink 3s ease-in-out infinite;
    }
    @keyframes idle-dot-blink {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.6; }
    }
    @-webkit-keyframes idle-dot-blink {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.6; }
    }
    .idle-status-text {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      opacity: 0.15;
    }
    .idle-subtitle {
      font-size: 0.95rem;
      font-weight: 300;
      opacity: 0.08;
      margin-top: 6px;
    }
    .idle-instructions {
      font-size: 0.9rem;
      font-weight: 400;
      opacity: 0.12;
      margin-top: 8px;
      letter-spacing: 0.01em;
    }
    .idle-address {
      font-size: 0.88rem;
      font-weight: 400;
      opacity: 0.1;
      margin-top: 24px;
      letter-spacing: 0.02em;
    }
    .idle-owner {
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0.11;
      margin-top: 6px;
      letter-spacing: 0.01em;
    }
    .idle-copyright {
      font-size: 0.75rem;
      font-weight: 400;
      opacity: 0.08;
      margin-top: 16px;
      letter-spacing: 0.02em;
    }
    .idle-footer {
      position: absolute;
      bottom: 30px;
      font-size: 0.75rem;
      font-weight: 500;
      opacity: 0.09;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }



    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="backdrop" id="backdrop"></div>
  <div class="backdrop-overlay"></div>

  <!-- PLAYING SCREEN -->
  <div class="playing-screen hidden" id="playing-screen">
    <div class="poster-col">
      <img class="poster-hero" id="poster" src="" alt="">
    </div>
    <div class="info-col">
      <!-- Now watching badge -->
      <div class="now-badge">
        <div class="now-dot"></div>
        <div class="now-text" id="now-text">NOW PLAYING</div>
      </div>

      <div class="show-title" id="title"></div>
      <div class="tagline hidden" id="tagline"></div>

      <!-- Meta chips row -->
      <div class="meta-row" id="meta-row"></div>

      <!-- Rating cards -->
      <div class="ratings-row" id="ratings-row"></div>

      <!-- Awards -->
      <div class="awards-text-only hidden" id="awards-text-only"></div>

      <!-- Box Office -->

  <script>
    // =====================================================================

                (screen.width >= 1280 && !("ontouchstart" in window) && !/Mobile|Tablet/i.test(navigator.userAgent));

    // =====================================================================

    function $(id) { return document.getElementById(id); }

    // =====================================================================
    //  Fetch wrapper
    // =====================================================================
    function fetchWithTimeout(url, opts, timeoutMs) {
      timeoutMs = timeoutMs || 10000;
      return new Promise(function(resolve, reject) {
        var aborted = false;
        var timer = setTimeout(function() {
          aborted = true;
          reject(new Error("timeout: " + url));
        }, timeoutMs);
        fetch(url, opts).then(function(res) {
          clearTimeout(timer);
          if (!aborted) resolve(res);
        }).catch(function(err) {
          clearTimeout(timer);
          if (!aborted) reject(err);
        });
      });
    }

    // =====================================================================
    //  API calls
    // =====================================================================
    var _traktKeyIdx = 0;
    function getTraktWatching(keyIdx) {
      keyIdx = (keyIdx !== undefined) ? keyIdx : _traktKeyIdx;
      var key = TRAKT_CLIENT_IDS[keyIdx];
      return fetchWithTimeout(
        "https://api.trakt.tv/users/" + TRAKT_USERNAME + "/watching",
        { headers: { "Content-Type": "application/json", "trakt-api-version": "2", "trakt-api-key": key } },
        12000
      ).then(function(res) {
        if (res.status === 204) return null;
        if ((res.status === 401 || res.status === 403) && keyIdx + 1 < TRAKT_CLIENT_IDS.length) {
          _traktKeyIdx = keyIdx + 1;
          return getTraktWatching(keyIdx + 1);
        }
        if (!res.ok) throw new Error("Trakt " + res.status);
        _traktKeyIdx = keyIdx;
        return res.json();
      });
    }

    function getTmdbDetails(type, tmdbId) {
      var extra = type === "tv"
        ? "credits,content_ratings,keywords,videos"
        : "credits,release_dates,keywords,videos";
      return fetchWithTimeout(
        "https://api.themoviedb.org/3/" + type + "/" + tmdbId + "?api_key=" + TMDB_API_KEY + "&append_to_response=" + extra
      ).then(function(res) {
        if (!res.ok) return null;
        return res.json();
      });
    }

    function getTmdbEpisode(showTmdbId, season, episode) {
      return fetchWithTimeout(
        "https://api.themoviedb.org/3/tv/" + showTmdbId + "/season/" + season + "/episode/" + episode + "?api_key=" + TMDB_API_KEY + "&append_to_response=credits"
      ).then(function(res) {
        if (!res.ok) return null;
        return res.json();
      });
    }

    // Return FULL OMDb object (not just ratings) for Awards, BoxOffice, Writer, etc.
    function getOmdbFull(imdbId) {
      return fetchWithTimeout(
        "https://www.omdbapi.com/?apikey=" + OMDB_API_KEY + "&i=" + imdbId + "&plot=short"
      ).then(function(res) {
        if (!res.ok) return null;
        return res.json();
      }).then(function(data) {
        if (!data || data.Response === "False") return null;
        return data;
      }).catch(function() { return null; });
    }

    // =====================================================================
    //  Helpers
    // =====================================================================
    function getCertification(tmdb, type) {
      if (type === "tv") {
        var results = tmdb.content_ratings && tmdb.content_ratings.results;
        if (results) {
          for (var i = 0; i < results.length; i++) {
            if (results[i].iso_3166_1 === "US") return results[i].rating;
          }
        }
        return null;
      } else {
        var rResults = tmdb.release_dates && tmdb.release_dates.results;
        if (rResults) {
          for (var j = 0; j < rResults.length; j++) {
            if (rResults[j].iso_3166_1 === "US") {
              var dates = rResults[j].release_dates || [];
              for (var k = 0; k < dates.length; k++) {
                if (dates[k].certification) return dates[k].certification;
              }
            }
          }
        }
        return null;
      }
    }

    function getDirector(tmdb, type) {
      if (type === "tv") {
        return (tmdb.created_by || []).map(function(c) { return c.name; });
      } else {
        var crew = (tmdb.credits && tmdb.credits.crew) || [];
        var dirs = [];
        for (var j = 0; j < crew.length; j++) {
          if (crew[j].job === "Director") dirs.push(crew[j].name);
        }
        return dirs;
      }
    }

    function fmtTime(mins) {
      var h = Math.floor(mins / 60);
      var m = Math.round(mins % 60);
      return h > 0 ? h + "h " + m + "m" : m + "m";
    }

    function fmtVotes(n) {
      if (typeof n === "string") n = parseInt(n.replace(/,/g, ""));
      if (!n || isNaN(n)) return "";
      if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
      if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1) + "K";
      return String(n);
    }

    function getLangName(code) {
      var m = { en:"English",es:"Spanish",fr:"French",de:"German",it:"Italian",pt:"Portuguese",ja:"Japanese",ko:"Korean",zh:"Chinese",hi:"Hindi",ar:"Arabic",ru:"Russian",sv:"Swedish",da:"Danish",nl:"Dutch",no:"Norwegian",pl:"Polish",tr:"Turkish",th:"Thai",vi:"Vietnamese",fi:"Finnish",cs:"Czech",hu:"Hungarian",ro:"Romanian",uk:"Ukrainian",el:"Greek",he:"Hebrew",id:"Indonesian",ms:"Malay",tl:"Filipino" };
      return m[code] || (code ? code.toUpperCase() : "");
    }

    // =====================================================================
    //  Clock
    // =====================================================================
    function startIdleClock() {
      clearInterval(clockTimer);
      updateClock();
      clockTimer = setInterval(updateClock, 1000);
    }
    function updateClock() {
      var now = new Date();
      var h = now.getHours();
      var m = String(now.getMinutes());
      if (m.length < 2) m = "0" + m;
      var h12 = h % 12 || 12;
      $("idle-clock").textContent = h12 + ":" + m;
      $("idle-ampm").textContent = h >= 12 ? "PM" : "AM";
      var days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      var months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      $("idle-date").textContent = days[now.getDay()] + ", " + months[now.getMonth()] + " " + now.getDate();
    }

    // =====================================================================
    //  Progress
    // =====================================================================
    function startProgress() {
      clearInterval(progressTimer);
      if (!playStarted || !playExpires) { $("progress-wrap").classList.add("hidden"); return; }
      $("progress-wrap").classList.remove("hidden");
      updateProgress();
      progressTimer = setInterval(updateProgress, 1000);
    }
    function updateProgress() {
      if (!playExpires) return;
      var now = Date.now();
      var remaining = playExpires - now;
      if (playRuntime) {
        // Use TMDB runtime + expires_at to derive actual position in the media
        var fullMs = playRuntime * 60000;
        var currentPos = fullMs - remaining;
        var pct = Math.min(100, Math.max(0, (currentPos / fullMs) * 100));
        $("progress-fill").style.width = pct + "%";
        $("progress-elapsed").textContent = fmtTime(Math.max(0, currentPos / 60000));
        $("progress-remaining").textContent = "-" + fmtTime(Math.max(0, remaining / 60000));
      } else {
        // Fallback: simple elapsed from start
        var elapsed = now - playStarted;
        var total = playExpires - playStarted;
        var pct2 = Math.min(100, Math.max(0, (elapsed / total) * 100));
        $("progress-fill").style.width = pct2 + "%";
        $("progress-elapsed").textContent = fmtTime(Math.max(0, elapsed / 60000));
        $("progress-remaining").textContent = "-" + fmtTime(Math.max(0, (total - elapsed) / 60000));
      }
    }

    function showTrailer() { }
    function hideTrailer() { }
    function scheduleTrailer() { }
    function killTrailer() { clearTimeout(trailerTimer); clearTimeout(trailerEndTimer); currentTrailerKey = null; }

    // =====================================================================
    //  Render
    // =====================================================================
    function showIdle() {
      currentId = null; playStarted = null; playExpires = null; playRuntime = null;
      clearInterval(progressTimer);
      killTrailer();
      $("playing-screen").classList.add("hidden");
      $("backdrop").style.backgroundImage = "";
      $("backdrop").style.opacity = "0";
      $("idle-screen").classList.remove("hidden");
      startIdleClock();
    }

    function render(d) {
      clearInterval(clockTimer);
      $("idle-screen").classList.add("hidden");
      $("playing-screen").style.opacity = "0";
      $("backdrop").style.opacity = "0";

      setTimeout(function() {
        // Backdrop + poster
        if (d.poster) $("backdrop").style.backgroundImage = "url(" + d.poster + ")";
        $("poster").src = d.poster || "";

        // Badge
        $("now-text").textContent = (d.isTV && d.season != null) ? "NOW WATCHING" : "NOW PLAYING";

        // Title + tagline
        $("title").textContent = d.title || "";
        var tagEl = $("tagline");
        if (d.tagline) { tagEl.textContent = '"' + d.tagline + '"'; tagEl.classList.remove("hidden"); }
        else tagEl.classList.add("hidden");

        // ── Meta chips ──
        var metaEl = $("meta-row");
        metaEl.innerHTML = "";
        if (d.certification) metaEl.innerHTML += '<span class="meta-chip cert">' + d.certification + '</span>';
        if (d.year) {
          var yt = d.year + (d.status === "Returning Series" ? "\u2013" : "");
          metaEl.innerHTML += '<span class="meta-chip">' + yt + '</span>';
        }
        if (d.runtime) metaEl.innerHTML += '<span class="meta-chip">' + fmtTime(d.runtime) + '</span>';
        if (d.language) metaEl.innerHTML += '<span class="meta-chip">' + d.language + '</span>';
        if (d.country) metaEl.innerHTML += '<span class="meta-chip">' + d.country + '</span>';
        if (d.season != null) {
          var s = String(d.season); if (s.length < 2) s = "0" + s;
          var e = String(d.episode); if (e.length < 2) e = "0" + e;
          var epText = "S" + s + "E" + e;
          if (d.episodeTitle) epText += "  \u00B7  " + d.episodeTitle;
          metaEl.innerHTML += '<span class="meta-chip episode">' + epText + '</span>';
        }
        if (d.numSeasons) {
          metaEl.innerHTML += '<span class="meta-chip seasons">' + d.numSeasons + ' Season' + (d.numSeasons > 1 ? 's' : '') + '</span>';
        }

        // ── Ratings ──
        var rEl = $("ratings-row");
        rEl.innerHTML = "";

        if (d.imdbRating) {
          rEl.innerHTML +=
            '<div class="r-card">' +
              '<div class="r-circle imdb">' + d.imdbRating + '</div>' +
              '<div class="r-info">' +
                '<div class="r-score">' + d.imdbRating + '<span style="font-size:0.7em;opacity:0.4">/10</span></div>' +
                '<div class="r-source">IMDb</div>' +
                (d.imdbVotes ? '<div class="r-sub">' + d.imdbVotes + ' ratings</div>' : '') +
              '</div>' +
            '</div>';
        }

        if (d.rtScore != null) {
          var rtN = parseInt(d.rtScore);
          var fresh = rtN >= 60;
          var rtIcon = fresh ? "&#127813;" : "&#129454;";
          var rtClass = fresh ? "rt" : "rt rotten";
          var rtWord = fresh ? "Fresh" : "Rotten";
          rEl.innerHTML +=
            '<div class="r-card">' +
              '<div class="r-circle ' + rtClass + '">' + rtIcon + '</div>' +
              '<div class="r-info">' +
                '<div class="r-score">' + d.rtScore + '</div>' +
                '<div class="r-source">ROTTEN TOMATOES</div>' +
                '<div class="r-sub">' + rtWord + '</div>' +
              '</div>' +
            '</div>';
        }

        if (d.metaScore) {
          var metaN = parseInt(d.metaScore);
          var metaClass = metaN >= 61 ? "meta-good" : metaN >= 40 ? "meta-mixed" : "meta-bad";
          var metaWord = metaN >= 61 ? "Favorable" : metaN >= 40 ? "Mixed" : "Unfavorable";
          rEl.innerHTML +=
            '<div class="r-card">' +
              '<div class="r-circle ' + metaClass + '">' + metaN + '</div>' +
              '<div class="r-info">' +
                '<div class="r-score">' + d.metaScore + '<span style="font-size:0.7em;opacity:0.4">/100</span></div>' +
                '<div class="r-source">METACRITIC</div>' +
                '<div class="r-sub">' + metaWord + '</div>' +
              '</div>' +
            '</div>';
        }

        if (d.tmdbScore) {
          rEl.innerHTML +=
            '<div class="r-card">' +
              '<div class="r-circle tmdb-c">' + d.tmdbScore + '</div>' +
              '<div class="r-info">' +
                '<div class="r-score">' + d.tmdbScore + '<span style="font-size:0.7em;opacity:0.4">/10</span></div>' +
                '<div class="r-source">TMDB</div>' +
                (d.tmdbVotes ? '<div class="r-sub">' + d.tmdbVotes + ' votes</div>' : '') +
              '</div>' +
            '</div>';
        }

        // ── Awards ──
        var awardsEl = $("awards-text-only");
        var NO_AWARD_QUIPS = [
          "Zero nominations. The Academy was busy.",
          "Snubbed by everyone. Still here.",
          "Not a single nomination. Bold artistic statement.",
          "Awards? We don't do that here.",
          "Critically invisible since release.",
          "Zero nominations. Truly groundbreaking.",
          "The Oscars have yet to acknowledge this masterpiece.",
          "No awards. No notes.",
          "Clean sweep — of absolutely nothing.",
          "The voters stayed home for this one."
        ];
        if (d.awards && d.awards !== "N/A") {
          awardsEl.textContent = d.awards;
        } else {
          awardsEl.textContent = NO_AWARD_QUIPS[Math.floor(Math.random() * NO_AWARD_QUIPS.length)];
        }
        awardsEl.classList.remove("hidden");

        // ── Box Office ──
        var boBar = $("box-office-bar");
        if (d.boxOffice && d.boxOffice !== "N/A") {
          $("box-office-val").textContent = d.boxOffice;
          boBar.classList.remove("hidden");
        } else {
          boBar.classList.add("hidden");
        }

        // ── Director ──
        var dirLine = $("director-line");
        if (d.directors && d.directors.length) {
          var dirLabel = d.isTV ? "Created by" : "Directed by";
          dirLine.innerHTML = '<span class="credit-label">' + dirLabel + '</span> <strong>' + d.directors.join(", ") + '</strong>';
          dirLine.classList.remove("hidden");
        } else dirLine.classList.add("hidden");

        // ── Writer ──
        var wrLine = $("writer-line");
        if (d.writers) {
          wrLine.innerHTML = '<span class="credit-label">Written by</span> <strong>' + d.writers + '</strong>';
          wrLine.classList.remove("hidden");
        } else wrLine.classList.add("hidden");

        // ── Summary ──
        var sumEl = $("summary");
        if (d.overview) { sumEl.textContent = d.overview; sumEl.classList.remove("hidden"); }
        else sumEl.classList.add("hidden");

        // ── Genres ──
        var genresEl = $("genres");
        genresEl.innerHTML = "";
        if (d.genres && d.genres.length) {
          for (var gi = 0; gi < d.genres.length; gi++) {
            genresEl.innerHTML += '<span class="pill">' + d.genres[gi] + '</span>';
          }
          $("genres-block").classList.remove("hidden");
        } else $("genres-block").classList.add("hidden");

        // ── Cast ──
        var castEl = $("cast");
        castEl.innerHTML = "";
        if (d.cast && d.cast.length) {
          for (var ci = 0; ci < d.cast.length; ci++) {
            var ch = d.cast[ci].character;
            castEl.innerHTML +=
              '<div class="cast-item">' + d.cast[ci].name +
              (ch ? ' <span class="cast-char">as ' + ch + '</span>' : '') +
              '</div>';
          }
          $("cast-block").classList.remove("hidden");
        } else $("cast-block").classList.add("hidden");

        // ── Network ──
        var netLine = $("network-line");
        if (d.network) {
          $("network-name").textContent = d.network.name;
          if (d.network.logo) { $("network-logo").src = d.network.logo; $("network-logo").classList.remove("hidden"); }
          else $("network-logo").classList.add("hidden");
          netLine.classList.remove("hidden");
        } else netLine.classList.add("hidden");

        // Reveal
        $("playing-screen").classList.remove("hidden");
        setTimeout(function() {
          $("backdrop").style.opacity = "0.4";
          $("playing-screen").style.opacity = "1";
        }, 50);

        playRuntime = d.runtime || null;
        startProgress();
        currentTrailerKey = d.trailerKey || null;
      }, 400);
    }

    // =====================================================================
    //  Trakt history fallback (Android TV: Stremio only sends stop scrobbles,
    //  so /watching returns 204 while actively watching — history catches it)
    // =====================================================================
    function getTraktHistory() {
      var key = TRAKT_CLIENT_IDS[_traktKeyIdx];
      return fetchWithTimeout(
        "https://api.trakt.tv/users/" + TRAKT_USERNAME + "/history?limit=1",
        { headers: { "Content-Type": "application/json", "trakt-api-version": "2", "trakt-api-key": key } },
        12000
      ).then(function(res) {
        if (!res.ok) return null;
        return res.json();
      }).then(function(items) {
        if (!items || !items.length) return null;
        var item = items[0];
        var watchedAt = new Date(item.watched_at).getTime();
        // Only surface if watched within the last 4 hours
        if (Date.now() - watchedAt > 4 * 60 * 60 * 1000) return null;
        item._fromHistory = true;
        return item;
      }).catch(function() { return null; });
    }

    // =====================================================================
    //  Main poll
    // =====================================================================
    function poll() {
      if (pollInFlight) return;
      pollInFlight = true;
      lastPollTime = Date.now();

      getTraktWatching().then(function(trakt) {
        if (!trakt || !trakt.type) {
          if (currentId) { missCount++; if (missCount < MISS_GRACE) { pollInFlight = false; return; } }
          // /watching returned nothing — try history (covers Android TV / Stremio app)
          getTraktHistory().then(function(hist) {
            if (hist) { missCount = 0; processItem(hist); }
            else { showIdle(); pollInFlight = false; }
          }).catch(function() { showIdle(); pollInFlight = false; });
          return;
        }
        missCount = 0;
        processItem(trakt);
      }).catch(function(err) { console.error("[side-tv]", err); pollInFlight = false; });
    }

    function processItem(trakt) {
        var mediaType = trakt.type;
        var item = trakt[mediaType];
        var show = trakt.show || null;

        var itemId = mediaType === "episode"
          ? (show && show.ids ? show.ids.trakt : "0") + "-s" + item.season + "e" + item.number
          : String(item.ids ? item.ids.trakt : "0");
        if (itemId === currentId) { pollInFlight = false; return; }
        currentId = itemId;

        // History items have no expires_at — hide progress bar
        playStarted = trakt._fromHistory ? null : (trakt.started_at ? new Date(trakt.started_at).getTime() : null);
        playExpires = trakt._fromHistory ? null : (trakt.expires_at ? new Date(trakt.expires_at).getTime() : null);

        var tmdbType = mediaType === "episode" ? "tv" : "movie";
        var tmdbId = mediaType === "episode"
          ? (show && show.ids ? show.ids.tmdb : null)
          : (item.ids ? item.ids.tmdb : null);
        if (!tmdbId) { showIdle(); pollInFlight = false; return; }

        var imdbId = mediaType === "episode"
          ? (show && show.ids ? show.ids.imdb : null)
          : (item.ids ? item.ids.imdb : null);

        Promise.all([
          getTmdbDetails(tmdbType, tmdbId),
          imdbId ? getOmdbFull(imdbId) : Promise.resolve(null)
        ]).then(function(results) {
          var tmdb = results[0];
          var omdb = results[1];

          if (!tmdb) { showIdle(); pollInFlight = false; return; }

          // Parse OMDb ratings
          var imdbRating = null, rtScore = null, metaScore = null;
          var omdbRatings = omdb && omdb.Ratings ? omdb.Ratings : [];
          for (var ri = 0; ri < omdbRatings.length; ri++) {
            var r = omdbRatings[ri];
            if (r.Source === "Internet Movie Database") imdbRating = r.Value.replace("/10", "");
            if (r.Source === "Rotten Tomatoes")         rtScore    = r.Value;
            if (r.Source === "Metacritic")              metaScore  = r.Value.replace("/100", "");
          }

          // TMDB score
          var tmdbScore = null, tmdbVotes = null;
          if (tmdb.vote_average && tmdb.vote_count > 0) {
            tmdbScore = tmdb.vote_average.toFixed(1);
            tmdbVotes = fmtVotes(tmdb.vote_count);
          }

          // IMDb votes from OMDb
          var imdbVotes = omdb && omdb.imdbVotes && omdb.imdbVotes !== "N/A" ? omdb.imdbVotes : null;

          // Language + Country
          var language = getLangName(tmdb.original_language);
          var country = "";
          if (tmdb.production_countries && tmdb.production_countries.length) {
            // Show first country only
            country = tmdb.production_countries[0].name || "";
            // Shorten "United States of America"
            if (country === "United States of America") country = "USA";
            if (country === "United Kingdom") country = "UK";
          }

          // Writers from OMDb
          var writers = omdb && omdb.Writer && omdb.Writer !== "N/A" ? omdb.Writer : null;

          // Awards from OMDb
          var awards = omdb && omdb.Awards && omdb.Awards !== "N/A" ? omdb.Awards : null;

          // Box office from OMDb
          var boxOffice = omdb && omdb.BoxOffice && omdb.BoxOffice !== "N/A" ? omdb.BoxOffice : null;

          var display = {
            title:         tmdb.title || tmdb.name || item.title,
            tagline:       tmdb.tagline || null,
            year:          (tmdb.release_date ? tmdb.release_date.slice(0,4) : null) || (tmdb.first_air_date ? tmdb.first_air_date.slice(0,4) : null) || item.year,
            runtime:       tmdb.runtime || (tmdb.episode_run_time && tmdb.episode_run_time[0]) || null,
            language:      language,
            country:       country,
            imdbRating:    imdbRating,
            imdbVotes:     imdbVotes,
            rtScore:       rtScore,
            metaScore:     metaScore,
            tmdbScore:     tmdbScore,
            tmdbVotes:     tmdbVotes,
            certification: getCertification(tmdb, tmdbType),
            status:        tmdb.status || null,
            overview:      tmdb.overview || "",
            isTV:          tmdbType === "tv",
            poster:        tmdb.poster_path ? "https://image.tmdb.org/t/p/w780" + tmdb.poster_path : null,
            genres:        (tmdb.genres || []).map(function(g) { return g.name; }),
            directors:     getDirector(tmdb, tmdbType),
            writers:       writers,
            awards:        awards,
            boxOffice:     boxOffice,
            numSeasons:    tmdb.number_of_seasons || null,
            cast:          ((tmdb.credits && tmdb.credits.cast) || []).slice(0, 8).map(function(a) {
                             return { name: a.name, character: a.character || "" };
                           }),
            network:       null,
            trailerKey:    null,
            season:        null,
            episode:       null,
            episodeTitle:  null
          };

          // Trailer from TMDB videos (already in the response)
          if (tmdb.videos && tmdb.videos.results) {
            var vids = tmdb.videos.results;
            var trailer = null;
            // Prefer official YouTube trailers, then teasers
            for (var vi = 0; vi < vids.length; vi++) {
              if (vids[vi].site === "YouTube" && vids[vi].type === "Trailer") { trailer = vids[vi]; break; }
            }
            if (!trailer) {
              for (var vj = 0; vj < vids.length; vj++) {
                if (vids[vj].site === "YouTube" && vids[vj].type === "Teaser") { trailer = vids[vj]; break; }
              }
            }
            if (trailer) display.trailerKey = trailer.key;
          }

          // Network / Studio
          if (tmdb.networks && tmdb.networks.length) {
            var net = tmdb.networks[0];
            display.network = { name: net.name, logo: net.logo_path ? "https://image.tmdb.org/t/p/w92" + net.logo_path : null };
          } else if (tmdb.production_companies && tmdb.production_companies.length) {
            var co = tmdb.production_companies[0];
            display.network = { name: co.name, logo: co.logo_path ? "https://image.tmdb.org/t/p/w92" + co.logo_path : null };
          }

          // Episode enrichment
          if (mediaType === "episode") {
            display.season = item.season;
            display.episode = item.number;
            display.episodeTitle = item.title;

            getTmdbEpisode(show.ids.tmdb, item.season, item.number).then(function(ep) {
              if (ep) {
                if (ep.overview) display.overview = ep.overview;
                if (ep.runtime)  display.runtime  = ep.runtime;
                var epCrew = (ep.credits && ep.credits.crew) || [];
                var epDir = [];
                for (var dd = 0; dd < epCrew.length; dd++) {
                  if (epCrew[dd].job === "Director") epDir.push(epCrew[dd].name);
                }
                if (epDir.length) { display.directors = epDir; display.isTV = false; }
              }
              render(display); pollInFlight = false;
            }).catch(function() { render(display); pollInFlight = false; });
          } else {
            render(display); pollInFlight = false;
          }

        }).catch(function(err) { console.error("[side-tv]", err); pollInFlight = false; });
    }

    // =====================================================================
    //  Robust polling
    // =====================================================================
    function startPollInterval() { clearInterval(pollTimer); pollTimer = setInterval(poll, POLL_INTERVAL); }
    document.addEventListener("visibilitychange", function() { if (!document.hidden) { poll(); startPollInterval(); } });
    window.addEventListener("focus", function() { poll(); startPollInterval(); });
    // bfcache restore (Android TV back navigation)
    window.addEventListener("pageshow", function(e) { if (e.persisted) { poll(); startPollInterval(); } });
    // Wake on any keypress / remote button (Android TV d-pad)
    document.addEventListener("keydown", function() {
      if (Date.now() - lastPollTime >= POLL_INTERVAL) { poll(); startPollInterval(); }
    });
    function watchdog() {
      if (Date.now() - lastPollTime >= POLL_INTERVAL * 2) { poll(); startPollInterval(); }
      setTimeout(watchdog, IS_TV ? POLL_INTERVAL * 1.5 : POLL_INTERVAL * 2.5);
    }
    // On TV browsers auto-reload every 3h (6h on desktop) to prevent memory creep
    setTimeout(function() { location.reload(); }, (IS_TV ? 3 : 6) * 60 * 60 * 1000);

    // Init
    showIdle();
    poll();
    startPollInterval();
    setTimeout(watchdog, POLL_INTERVAL * 3);
  </script>
</body>
</html>
