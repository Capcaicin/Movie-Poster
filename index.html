<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Now Watching • Side TV</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #08080f;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ══════════════════════════════════════════════════════
       PLAYING STATE — vertical poster-centric layout
       ══════════════════════════════════════════════════════ */

    /* ── Backdrop (subtle wash behind everything) ── */
    .backdrop {
      position: fixed; inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0.2;
      filter: blur(40px) saturate(1.4);
      transform: scale(1.1);
      transition: opacity 1.2s ease;
      z-index: 1;
    }

    /* ── Main vertical container ── */
    .playing-screen {
      position: fixed; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
      transition: opacity 0.6s ease;
      overflow: hidden;
    }

    /* ── Poster (hero, top portion) ── */
    .poster-hero {
      width: 62%;
      max-width: 400px;
      margin-top: 4vh;
      border-radius: 14px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.06);
      transition: opacity 0.8s ease;
      flex-shrink: 0;
    }

    /* ── Info panel (below poster) ── */
    .info-panel {
      width: 88%;
      max-width: 480px;
      margin-top: 3vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      flex-shrink: 1;
      min-height: 0;
      overflow-y: auto;
      padding-bottom: 3vh;
      /* hide scrollbar */
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .info-panel::-webkit-scrollbar { display: none; }

    /* ── Title ── */
    .show-title {
      font-size: 2.4rem;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      text-shadow: 0 4px 30px rgba(0,0,0,0.6);
    }

    /* ── Tagline ── */
    .tagline {
      font-size: 0.85rem;
      font-style: italic;
      opacity: 0.45;
      margin-top: 6px;
    }

    /* ── Ratings row (IMDb + RT + Metacritic) ── */
    .ratings-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .rating-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.95rem;
      font-weight: 700;
    }
    .rating-icon {
      width: 20px; height: 20px;
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.55rem; font-weight: 900;
      flex-shrink: 0;
    }
    .rating-icon.imdb  { background: #f5c518; color: #000; }
    .rating-icon.rt     { background: #FA320A; color: #fff; }
    .rating-icon.meta   { background: #66cc33; color: #000; }
    .rating-icon.rt.rotten { background: #0AC855; }

    /* ── Meta row (cert, runtime, year) ── */
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-top: 12px;
      font-size: 0.88rem;
      font-weight: 500;
      opacity: 0.7;
      flex-wrap: wrap;
    }
    .meta-row .sep { opacity: 0.3; }
    .cert-badge {
      border: 1.5px solid rgba(255,255,255,0.45);
      padding: 1px 7px;
      border-radius: 3px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .episode-tag {
      background: rgba(255,255,255,0.12);
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      width: 100%;
      margin-top: 14px;
    }
    .progress-bar-bg {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #e50914;
      border-radius: 2px;
      transition: width 15s linear;
    }
    .progress-times {
      display: flex;
      justify-content: space-between;
      font-size: 0.68rem;
      opacity: 0.35;
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
    }

    /* ── Section labels ── */
    .section-label {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      opacity: 0.3;
      margin-bottom: 7px;
      margin-top: 16px;
    }

    /* ── Pills ── */
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }
    .pill {
      background: rgba(255,255,255,0.08);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      white-space: nowrap;
    }

    /* ── Credits ── */
    .credit-line {
      font-size: 0.8rem;
      opacity: 0.5;
      margin-top: 12px;
    }
    .credit-line strong { opacity: 1; font-weight: 600; }

    /* ── Summary ── */
    .summary {
      font-size: 0.82rem;
      line-height: 1.55;
      opacity: 0.65;
      margin-top: 6px;
      text-align: center;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Network ── */
    .network-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
      opacity: 0.35;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .network-logo {
      height: 16px;
      filter: brightness(0) invert(1);
      opacity: 0.7;
    }

    /* ══════════════════════════════════════════════════════
       IDLE STATE — stylish "nothing playing" screen
       ══════════════════════════════════════════════════════ */
    .idle-screen {
      position: fixed; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 5;
      background: #08080f;
    }

    /* Animated gradient orb */
    .idle-orb {
      width: 280px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%,
        rgba(229,9,20,0.25) 0%,
        rgba(100,50,200,0.15) 40%,
        rgba(20,20,60,0.05) 70%,
        transparent 100%);
      filter: blur(60px);
      animation: orb-pulse 6s ease-in-out infinite;
      position: absolute;
    }
    @keyframes orb-pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50%      { transform: scale(1.15); opacity: 0.9; }
    }

    .idle-icon {
      font-size: 3.5rem;
      margin-bottom: 20px;
      opacity: 0.25;
      z-index: 1;
    }
    .idle-title {
      font-size: 1.6rem;
      font-weight: 700;
      opacity: 0.5;
      z-index: 1;
      letter-spacing: -0.01em;
    }
    .idle-subtitle {
      font-size: 0.9rem;
      opacity: 0.2;
      margin-top: 8px;
      z-index: 1;
      font-weight: 400;
    }
    .idle-clock {
      font-size: 4rem;
      font-weight: 200;
      opacity: 0.15;
      margin-top: 40px;
      z-index: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
    }

    /* ══════════════════════════════════════════════════════
       TRAILER
       ══════════════════════════════════════════════════════ */
    .trailer-overlay {
      position: fixed; inset: 0;
      background: #000;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }
    .trailer-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .trailer-overlay iframe {
      width: 100%; height: 100%; border: none;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- BACKDROP (blurred color wash) -->
  <div class="backdrop" id="backdrop"></div>

  <!-- ═══ PLAYING SCREEN ═══ -->
  <div class="playing-screen hidden" id="playing-screen">
    <!-- Poster -->
    <img class="poster-hero" id="poster" src="" alt="">

    <!-- Info below poster -->
    <div class="info-panel" id="info-panel">
      <div class="show-title" id="title"></div>
      <div class="tagline hidden" id="tagline"></div>

      <!-- Ratings: IMDb · RT · Metacritic -->
      <div class="ratings-row" id="ratings-row"></div>

      <!-- Meta: cert · runtime · year · episode -->
      <div class="meta-row" id="meta-row">
        <span class="cert-badge hidden" id="cert"></span>
        <span id="runtime"></span>
        <span class="sep">•</span>
        <span id="year"></span>
        <span class="episode-tag hidden" id="episode-tag"></span>
      </div>

      <!-- Progress -->
      <div class="progress-wrap hidden" id="progress-wrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <div class="progress-times">
          <span id="progress-elapsed">0:00</span>
          <span id="progress-remaining">0:00</span>
        </div>
      </div>

      <div class="section-label" id="genres-label">GENRES</div>
      <div class="pills" id="genres"></div>

      <div class="section-label" id="cast-label">CAST</div>
      <div class="pills" id="cast"></div>

      <div class="credit-line hidden" id="credit-line"></div>

      <div class="section-label" id="summary-label">SUMMARY</div>
      <div class="summary" id="summary"></div>

      <div class="network-line hidden" id="network-line">
        <img class="network-logo hidden" id="network-logo" src="" alt="">
        <span id="network-name"></span>
      </div>
    </div>
  </div>

  <!-- ═══ IDLE SCREEN ═══ -->
  <div class="idle-screen" id="idle-screen">
    <div class="idle-orb"></div>
    <div class="idle-icon">▶</div>
    <div class="idle-title">Nothing Playing</div>
    <div class="idle-subtitle">Start watching something on Stremio</div>
    <div class="idle-clock" id="idle-clock"></div>
  </div>

  <!-- ═══ TRAILER ═══ -->
  <div class="trailer-overlay" id="trailer-overlay">
    <iframe id="trailer-iframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>

  <script>
    // =====================================================================
    //  CONFIG
    // =====================================================================
    const TRAKT_USERNAME   = "tannorino";
    const TRAKT_CLIENT_ID  = "9e5efaab5af9ff42f947317b83e0089f16dd7bd9b487dc7028dbaa62d5cb66e0";
    const TMDB_API_KEY     = "86341e3584cca1bc1543a57b43d12bd9";
    const OMDB_API_KEY     = "trilogy";  // free tier — 1000 req/day
    const POLL_INTERVAL    = 15000;
    const TRAILER_INTERVAL = 5 * 60 * 1000;
    const TRAILER_DURATION = 60 * 1000;

    // =====================================================================
    //  State
    // =====================================================================
    let currentId = null;
    let currentTrailerKey = null;
    let trailerTimer = null;
    let progressTimer = null;
    let clockTimer = null;
    let missCount = 0;
    const MISS_GRACE = 4;
    let playStarted = null;
    let playExpires = null;

    const $ = id => document.getElementById(id);

    // =====================================================================
    //  API calls
    // =====================================================================
    async function getTraktWatching() {
      const res = await fetch(
        `https://api.trakt.tv/users/${TRAKT_USERNAME}/watching`, {
          headers: {
            "Content-Type": "application/json",
            "trakt-api-version": "2",
            "trakt-api-key": TRAKT_CLIENT_ID
          }
        }
      );
      if (res.status === 204) return null;
      if (!res.ok) throw new Error(`Trakt ${res.status}`);
      return res.json();
    }

    async function getTmdbDetails(type, tmdbId) {
      const extra = type === "tv"
        ? "credits,videos,content_ratings"
        : "credits,videos,release_dates";
      const res = await fetch(
        `https://api.themoviedb.org/3/${type}/${tmdbId}?api_key=${TMDB_API_KEY}&append_to_response=${extra}`
      );
      if (!res.ok) return null;
      return res.json();
    }

    async function getTmdbEpisode(showTmdbId, season, episode) {
      const res = await fetch(
        `https://api.themoviedb.org/3/tv/${showTmdbId}/season/${season}/episode/${episode}?api_key=${TMDB_API_KEY}&append_to_response=credits`
      );
      if (!res.ok) return null;
      return res.json();
    }

    async function getOmdbRatings(imdbId) {
      try {
        const res = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_API_KEY}&i=${imdbId}`);
        if (!res.ok) return null;
        const data = await res.json();
        if (data.Response === "False") return null;
        return data.Ratings || [];
      } catch { return null; }
    }

    // =====================================================================
    //  Helpers
    // =====================================================================
    function getCertification(tmdb, type) {
      if (type === "tv") {
        const us = tmdb.content_ratings?.results?.find(r => r.iso_3166_1 === "US");
        return us?.rating || null;
      } else {
        const us = tmdb.release_dates?.results?.find(r => r.iso_3166_1 === "US");
        const cert = us?.release_dates?.find(r => r.certification);
        return cert?.certification || null;
      }
    }

    function getDirector(tmdb, type) {
      if (type === "tv") {
        return tmdb.created_by?.map(c => c.name) || [];
      } else {
        return (tmdb.credits?.crew || [])
          .filter(c => c.job === "Director")
          .map(c => c.name);
      }
    }

    function fmtTime(mins) {
      const h = Math.floor(mins / 60);
      const m = Math.round(mins % 60);
      return h > 0 ? `${h}h ${m}m` : `${m}m`;
    }

    // =====================================================================
    //  Idle clock
    // =====================================================================
    function startIdleClock() {
      clearInterval(clockTimer);
      updateClock();
      clockTimer = setInterval(updateClock, 1000);
    }
    function updateClock() {
      const now = new Date();
      const h = now.getHours();
      const m = String(now.getMinutes()).padStart(2, "0");
      const ampm = h >= 12 ? "PM" : "AM";
      const h12 = h % 12 || 12;
      $("idle-clock").textContent = `${h12}:${m} ${ampm}`;
    }

    // =====================================================================
    //  Progress bar
    // =====================================================================
    function startProgress() {
      clearInterval(progressTimer);
      if (!playStarted || !playExpires) {
        $("progress-wrap").classList.add("hidden");
        return;
      }
      $("progress-wrap").classList.remove("hidden");
      updateProgress();
      progressTimer = setInterval(updateProgress, 1000);
    }

    function updateProgress() {
      if (!playStarted || !playExpires) return;
      const now     = Date.now();
      const total   = playExpires - playStarted;
      const elapsed = now - playStarted;
      const pct     = Math.min(100, Math.max(0, (elapsed / total) * 100));
      $("progress-fill").style.width = pct + "%";
      const elapsedMin = Math.max(0, elapsed / 60000);
      const remainMin  = Math.max(0, (total - elapsed) / 60000);
      $("progress-elapsed").textContent   = fmtTime(elapsedMin);
      $("progress-remaining").textContent = "-" + fmtTime(remainMin);
    }

    // =====================================================================
    //  Trailer
    // =====================================================================
    function scheduleTrailer() {
      clearTimeout(trailerTimer);
      if (!currentTrailerKey) return;
      trailerTimer = setTimeout(showTrailer, TRAILER_INTERVAL);
    }

    function showTrailer() {
      if (!currentTrailerKey) return;
      $("trailer-iframe").src = `https://www.youtube.com/embed/${currentTrailerKey}?autoplay=1&controls=0&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3`;
      $("trailer-overlay").classList.add("active");
      setTimeout(() => {
        $("trailer-overlay").classList.remove("active");
        setTimeout(() => { $("trailer-iframe").src = ""; }, 800);
        scheduleTrailer();
      }, TRAILER_DURATION);
    }

    // =====================================================================
    //  Render
    // =====================================================================
    function showIdle() {
      currentId = null;
      currentTrailerKey = null;
      playStarted = null;
      playExpires = null;
      clearTimeout(trailerTimer);
      clearInterval(progressTimer);
      $("playing-screen").classList.add("hidden");
      $("backdrop").style.backgroundImage = "";
      $("idle-screen").classList.remove("hidden");
      $("trailer-overlay").classList.remove("active");
      $("trailer-iframe").src = "";
      startIdleClock();
    }

    function render(data) {
      clearInterval(clockTimer);
      $("idle-screen").classList.add("hidden");

      $("playing-screen").style.opacity = "0";
      $("backdrop").style.opacity = "0";

      setTimeout(() => {
        // Backdrop
        if (data.poster) {
          $("backdrop").style.backgroundImage = `url(${data.poster})`;
        }

        // Poster
        $("poster").src = data.poster || "";

        // Title
        $("title").textContent = data.title || "";

        // Tagline
        const tagEl = $("tagline");
        if (data.tagline) {
          tagEl.textContent = `"${data.tagline}"`;
          tagEl.classList.remove("hidden");
        } else {
          tagEl.classList.add("hidden");
        }

        // ── Ratings row (IMDb + RT + Metacritic) ──
        const ratingsEl = $("ratings-row");
        ratingsEl.innerHTML = "";

        if (data.imdbRating) {
          ratingsEl.innerHTML += `
            <div class="rating-badge">
              <div class="rating-icon imdb">IMDb</div>
              <span>${data.imdbRating}</span>
            </div>`;
        }
        if (data.rtScore != null) {
          const fresh = parseInt(data.rtScore) >= 60;
          ratingsEl.innerHTML += `
            <div class="rating-badge">
              <div class="rating-icon rt ${fresh ? '' : 'rotten'}">${fresh ? '🍅' : '🟢'}</div>
              <span>${data.rtScore}</span>
            </div>`;
        }
        if (data.metaScore) {
          ratingsEl.innerHTML += `
            <div class="rating-badge">
              <div class="rating-icon meta">M</div>
              <span>${data.metaScore}</span>
            </div>`;
        }

        // Certification
        const certEl = $("cert");
        if (data.certification) {
          certEl.textContent = data.certification;
          certEl.classList.remove("hidden");
        } else {
          certEl.classList.add("hidden");
        }

        // Runtime
        $("runtime").textContent = data.runtime ? fmtTime(data.runtime) : "";

        // Year
        $("year").textContent = data.year
          ? `${data.year}${data.status === "Returning Series" ? "–" : ""}`
          : "";

        // Episode tag
        const epTag = $("episode-tag");
        if (data.season != null) {
          const s = String(data.season).padStart(2, "0");
          const e = String(data.episode).padStart(2, "0");
          epTag.textContent = `S${s}E${e}${data.episodeTitle ? " · " + data.episodeTitle : ""}`;
          epTag.classList.remove("hidden");
        } else {
          epTag.classList.add("hidden");
        }

        // Genres
        const genresEl = $("genres");
        genresEl.innerHTML = "";
        if (data.genres?.length) {
          data.genres.forEach(g => {
            const span = document.createElement("span");
            span.className = "pill";
            span.textContent = g;
            genresEl.appendChild(span);
          });
          $("genres-label").classList.remove("hidden");
        } else {
          $("genres-label").classList.add("hidden");
        }

        // Cast
        const castEl = $("cast");
        castEl.innerHTML = "";
        if (data.cast?.length) {
          data.cast.forEach(c => {
            const span = document.createElement("span");
            span.className = "pill";
            span.textContent = c.name;
            castEl.appendChild(span);
          });
          $("cast-label").classList.remove("hidden");
        } else {
          $("cast-label").classList.add("hidden");
        }

        // Director / Creator
        const creditEl = $("credit-line");
        if (data.directors?.length) {
          const label = data.isTV ? "Created by" : "Directed by";
          creditEl.innerHTML = `${label} <strong>${data.directors.join(", ")}</strong>`;
          creditEl.classList.remove("hidden");
        } else {
          creditEl.classList.add("hidden");
        }

        // Summary
        $("summary").textContent = data.overview || "";
        $("summary-label").style.display = data.overview ? "" : "none";

        // Network / Studio
        const netLine = $("network-line");
        if (data.network) {
          $("network-name").textContent = data.network.name;
          if (data.network.logo) {
            $("network-logo").src = data.network.logo;
            $("network-logo").classList.remove("hidden");
          } else {
            $("network-logo").classList.add("hidden");
          }
          netLine.classList.remove("hidden");
        } else {
          netLine.classList.add("hidden");
        }

        // Show
        $("playing-screen").classList.remove("hidden");

        requestAnimationFrame(() => {
          $("backdrop").style.opacity = "0.2";
          $("playing-screen").style.opacity = "1";
        });

        startProgress();
        currentTrailerKey = data.trailerKey || null;
        scheduleTrailer();

      }, 400);
    }

    // =====================================================================
    //  Main poll loop
    // =====================================================================
    async function poll() {
      try {
        const trakt = await getTraktWatching();

        if (!trakt || !trakt.type) {
          if (currentId) {
            missCount++;
            if (missCount < MISS_GRACE) return;
          }
          showIdle();
          return;
        }
        missCount = 0;

        const mediaType = trakt.type;
        const item      = trakt[mediaType];
        const show      = trakt.show || null;

        // Dedupe
        const itemId = mediaType === "episode"
          ? `${show?.ids?.trakt}-s${item.season}e${item.number}`
          : `${item.ids?.trakt}`;
        if (itemId === currentId) return;
        currentId = itemId;

        // Trakt timestamps
        playStarted = trakt.started_at ? new Date(trakt.started_at).getTime() : null;
        playExpires = trakt.expires_at ? new Date(trakt.expires_at).getTime() : null;

        // TMDB
        const tmdbType = mediaType === "episode" ? "tv" : "movie";
        const tmdbId   = mediaType === "episode" ? show?.ids?.tmdb : item.ids?.tmdb;
        if (!tmdbId) { showIdle(); return; }

        // Fetch TMDB + OMDb in parallel
        const imdbId = mediaType === "episode" ? show?.ids?.imdb : item.ids?.imdb;
        const [tmdb, omdbRatings] = await Promise.all([
          getTmdbDetails(tmdbType, tmdbId),
          imdbId ? getOmdbRatings(imdbId) : Promise.resolve(null),
        ]);

        if (!tmdb) { showIdle(); return; }

        // Parse OMDb ratings
        let imdbRating = null, rtScore = null, metaScore = null;
        if (omdbRatings) {
          for (const r of omdbRatings) {
            if (r.Source === "Internet Movie Database") imdbRating = r.Value.replace("/10", "");
            if (r.Source === "Rotten Tomatoes")         rtScore    = r.Value;
            if (r.Source === "Metacritic")              metaScore  = r.Value.replace("/100", "");
          }
        }
        // Fallback IMDb from TMDB
        if (!imdbRating && tmdb.vote_average) {
          imdbRating = tmdb.vote_average.toFixed(1);
        }

        // Build display
        const display = {
          title:         tmdb.title || tmdb.name || item.title,
          tagline:       tmdb.tagline || null,
          year:          tmdb.release_date?.slice(0,4) || tmdb.first_air_date?.slice(0,4) || item.year,
          runtime:       tmdb.runtime || tmdb.episode_run_time?.[0] || null,
          imdbRating,
          rtScore,
          metaScore,
          certification: getCertification(tmdb, tmdbType),
          status:        tmdb.status || null,
          overview:      tmdb.overview || "",
          isTV:          tmdbType === "tv",
          poster:        tmdb.poster_path   ? `https://image.tmdb.org/t/p/w780${tmdb.poster_path}` : null,
          genres:        (tmdb.genres || []).map(g => g.name),
          directors:     getDirector(tmdb, tmdbType),
          cast:          (tmdb.credits?.cast || []).slice(0, 6).map(a => ({
                           name: a.name,
                         })),
          network:       null,
          trailerKey:    null,
          season:        null,
          episode:       null,
          episodeTitle:  null,
        };

        // Network / Studio
        if (tmdb.networks?.length) {
          const net = tmdb.networks[0];
          display.network = {
            name: net.name,
            logo: net.logo_path ? `https://image.tmdb.org/t/p/w92${net.logo_path}` : null,
          };
        } else if (tmdb.production_companies?.length) {
          const co = tmdb.production_companies[0];
          display.network = {
            name: co.name,
            logo: co.logo_path ? `https://image.tmdb.org/t/p/w92${co.logo_path}` : null,
          };
        }

        // Trailer
        if (tmdb.videos?.results) {
          const trailer = tmdb.videos.results.find(v =>
            v.site === "YouTube" && (v.type === "Trailer" || v.type === "Teaser")
          );
          if (trailer) display.trailerKey = trailer.key;
        }

        // Episode-specific
        if (mediaType === "episode") {
          display.season       = item.season;
          display.episode      = item.number;
          display.episodeTitle = item.title;

          const ep = await getTmdbEpisode(show.ids.tmdb, item.season, item.number);
          if (ep) {
            if (ep.overview) display.overview = ep.overview;
            if (ep.runtime)  display.runtime  = ep.runtime;
            const epDir = (ep.credits?.crew || []).filter(c => c.job === "Director").map(c => c.name);
            if (epDir.length) {
              display.directors = epDir;
              display.isTV = false;
            }
          }
        }

        render(display);

      } catch (err) {
        console.error("[side-tv]", err);
      }
    }

    // =====================================================================
    //  Init
    // =====================================================================
    showIdle();
    poll();
    setInterval(poll, POLL_INTERVAL);

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) poll();
    });
  </script>
</body>
</html>
