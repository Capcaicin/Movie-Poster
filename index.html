<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Now Watching • Side TV</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; background: #0a0a0a; color: #fff; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; }
    .fanart { position: absolute; inset: 0; object-fit: cover; opacity: 0.35; filter: blur(8px); z-index: 1; transition: opacity 0.6s ease; }
    .poster { max-height: 68vh; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.6); border-radius: 16px; z-index: 2; transition: opacity 0.6s ease; }
    .info { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, #0a0a0a, transparent); padding: 40px 60px; z-index: 3; }
    .title { font-size: 3.2rem; font-weight: 700; line-height: 1.1; margin: 0 0 12px 0; }
    .meta { font-size: 1.35rem; opacity: 0.9; margin-bottom: 16px; }
    .plot { font-size: 1.25rem; max-width: 820px; line-height: 1.5; opacity: 0.85; }
    .cast { display: flex; gap: 24px; margin-top: 28px; overflow-x: auto; padding-bottom: 12px; }
    .cast-member { text-align: center; width: 92px; flex-shrink: 0; }
    .cast-img { width: 82px; height: 82px; border-radius: 9999px; object-fit: cover; border: 3px solid #fff; }
    .cast-name { font-size: 0.95rem; margin-top: 8px; opacity: 0.85; }
    .nothing { font-size: 2.8rem; opacity: 0.6; text-align: center; margin-top: 20vh; }
    .episode-info { font-size: 1.1rem; opacity: 0.75; margin-bottom: 8px; }
  </style>
</head>
<body class="flex items-center justify-center">
  <img id="fanart" class="fanart" src="" alt="">

  <div class="relative z-10 flex flex-col items-center justify-center h-screen w-full px-8">
    <img id="poster" class="poster hidden" src="" alt="Poster">

    <div id="info" class="info hidden">
      <div class="episode-info hidden" id="episode-info"></div>
      <div class="title" id="title"></div>
      <div class="meta" id="meta"></div>
      <div class="plot" id="plot"></div>
      <div id="cast-container" class="cast hidden"></div>
    </div>

    <div id="nothing" class="nothing hidden">Nothing playing right now</div>
  </div>

  <script>
    const TMDB_API_KEY = "86341e3584cca1bc1543a57b43d12bd9";
    const TRAKT_USERNAME = "tannorino";

    let currentContent = null;

    async function fetchNowPlaying() {
      try {
        // Fetch from public Trakt endpoint
        const traktRes = await fetch(`https://api.trakt.tv/users/${TRAKT_USERNAME}/watching`, {
          headers: {
            'Content-Type': 'application/json',
            'trakt-api-version': '2',
            'trakt-api-key': '9e5efaab5af9ff42f947317b83e0089f16dd7bd9b487dc7028dbaa62d5cb66e0'
          }
        });

        // 204 = nothing playing
        if (traktRes.status === 204 || traktRes.status === 404) {
          showNothing();
          return;
        }

        if (!traktRes.ok) {
          showNothing();
          return;
        }

        const data = await traktRes.json();
        if (!data || !data.type) {
          showNothing();
          return;
        }

        // Dedup: only update if content changed
        const contentKey = `${data.type}-${data[data.type]?.ids?.trakt}`;
        if (currentContent === contentKey) {
          return;
        }
        currentContent = contentKey;

        const mediaType = data.type; // "movie" or "episode"
        const item = data[mediaType];
        const tmdbId = item?.ids?.tmdb;

        if (!tmdbId) {
          showNothing();
          return;
        }

        // Enrich with TMDB
        const tmdbType = mediaType === "episode" ? "tv" : "movie";
        const tmdbUrl = mediaType === "episode" 
          ? `https://api.themoviedb.org/3/tv/${data.show.ids.tmdb}?api_key=${TMDB_API_KEY}&append_to_response=credits`
          : `https://api.themoviedb.org/3/movie/${tmdbId}?api_key=${TMDB_API_KEY}&append_to_response=credits`;

        const tmdbRes = await fetch(tmdbUrl);
        if (!tmdbRes.ok) {
          showNothing();
          return;
        }

        const tmdbData = await tmdbRes.json();

        // Fade out current content
        document.getElementById('poster').style.opacity = '0';
        document.getElementById('fanart').style.opacity = '0';

        setTimeout(() => {
          // Update poster
          if (tmdbData.poster_path) {
            document.getElementById('poster').src = `https://image.tmdb.org/t/p/original${tmdbData.poster_path}`;
            document.getElementById('poster').classList.remove('hidden');
          }

          // Update backdrop
          if (tmdbData.backdrop_path) {
            document.getElementById('fanart').src = `https://image.tmdb.org/t/p/original${tmdbData.backdrop_path}`;
          }

          // Title
          const yearStr = tmdbData.release_date ? ` (${tmdbData.release_date.split('-')[0]})` : 
                          tmdbData.first_air_date ? ` (${tmdbData.first_air_date.split('-')[0]})` : '';
          document.getElementById('title').textContent = `${tmdbData.title || tmdbData.name}${yearStr}`;

          // Episode info
          const epInfo = document.getElementById('episode-info');
          if (mediaType === "episode" && item.season != null) {
            epInfo.textContent = `S${String(item.season).padStart(2, "0")}E${String(item.number).padStart(2, "0")} — ${item.title || ''}`;
            epInfo.classList.remove('hidden');
          } else {
            epInfo.classList.add('hidden');
          }

          // Rating
          document.getElementById('meta').innerHTML = `★ ${(tmdbData.vote_average || 0).toFixed(1)}`;

          // Plot
          document.getElementById('plot').textContent = tmdbData.overview || '';

          // Cast
          const castContainer = document.getElementById('cast-container');
          castContainer.innerHTML = '';
          if (tmdbData.credits?.cast) {
            tmdbData.credits.cast.slice(0, 8).forEach(actor => {
              if (!actor.profile_path) return;
              const div = document.createElement('div');
              div.className = 'cast-member';
              div.innerHTML = `<img src="https://image.tmdb.org/t/p/w185${actor.profile_path}" class="cast-img" loading="lazy"><div class="cast-name">${actor.name}</div>`;
              castContainer.appendChild(div);
            });
            castContainer.classList.remove('hidden');
          } else {
            castContainer.classList.add('hidden');
          }

          document.getElementById('info').classList.remove('hidden');
          document.getElementById('nothing').classList.add('hidden');

          // Fade back in
          document.getElementById('poster').style.opacity = '1';
          document.getElementById('fanart').style.opacity = '0.35';
        }, 300);

      } catch (e) {
        console.error("[side-tv]", e);
        showNothing();
      }
    }

    function showNothing() {
      document.getElementById('poster').classList.add('hidden');
      document.getElementById('info').classList.add('hidden');
      document.getElementById('nothing').classList.remove('hidden');
      currentContent = null;
    }

    // Initial fetch and poll every 15s
    fetchNowPlaying();
    setInterval(fetchNowPlaying, 15000);
  </script>
</body>
</html>
