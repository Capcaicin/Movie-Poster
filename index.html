<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Now Watching • Side TV</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a14;
      color: #fff;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ── Backdrop ── */
    .backdrop {
      position: fixed; inset: 0;
      background-size: cover;
      background-position: center right;
      background-repeat: no-repeat;
      transition: opacity 1s ease;
      z-index: 1;
    }
    .backdrop-gradient {
      position: fixed; inset: 0;
      background:
        linear-gradient(to right, #0a0a14 0%, #0a0a14 28%, rgba(10,10,20,0.92) 42%, rgba(10,10,20,0.6) 60%, rgba(10,10,20,0.25) 80%, rgba(10,10,20,0.1) 100%),
        linear-gradient(to top, #0a0a14 0%, rgba(10,10,20,0.6) 25%, transparent 50%);
      z-index: 2;
    }

    /* ── Content panel (left side) ── */
    .content {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 56%;
      padding: 48px 50px 40px 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      z-index: 3;
      transition: opacity 0.5s ease;
    }

    /* ── Title ── */
    .show-title {
      font-size: 3.8rem;
      font-weight: 900;
      line-height: 1.0;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      margin-bottom: 8px;
      text-shadow: 0 4px 30px rgba(0,0,0,0.7);
    }

    /* ── Tagline ── */
    .tagline {
      font-size: 1.05rem;
      font-style: italic;
      opacity: 0.5;
      margin-bottom: 18px;
      max-width: 500px;
    }

    /* ── Meta row ── */
    .meta-row {
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: 1.05rem;
      font-weight: 500;
      opacity: 0.9;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .meta-row .separator { opacity: 0.35; }
    .rating-group {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .imdb-badge {
      display: inline-block;
      background: #f5c518;
      color: #000;
      font-weight: 800;
      font-size: 0.65rem;
      padding: 2px 5px;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }
    .cert-badge {
      display: inline-block;
      border: 1.5px solid rgba(255,255,255,0.5);
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      opacity: 0.85;
    }
    .episode-tag {
      background: rgba(255,255,255,0.15);
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      margin-bottom: 20px;
      max-width: 500px;
    }
    .progress-bar-bg {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #e50914;
      border-radius: 2px;
      transition: width 15s linear;
    }
    .progress-times {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      opacity: 0.45;
      margin-top: 5px;
      font-variant-numeric: tabular-nums;
    }

    /* ── Section labels ── */
    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      opacity: 0.4;
      margin-bottom: 8px;
      margin-top: 16px;
    }

    /* ── Pills ── */
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }
    .pill {
      background: rgba(255,255,255,0.1);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.88rem;
      font-weight: 500;
      white-space: nowrap;
    }

    /* ── Director / Creator ── */
    .credit-line {
      font-size: 0.92rem;
      opacity: 0.65;
      margin-top: 14px;
    }
    .credit-line strong {
      opacity: 1;
      font-weight: 600;
    }

    /* ── Summary ── */
    .summary {
      font-size: 1.0rem;
      line-height: 1.55;
      opacity: 0.8;
      max-width: 560px;
      margin-top: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Network / Studio ── */
    .network-line {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
      opacity: 0.5;
      font-size: 0.85rem;
    }
    .network-logo {
      height: 20px;
      filter: brightness(0) invert(1);
      opacity: 0.7;
    }

    /* ── Poster (bottom-right accent) ── */
    .poster-float {
      position: fixed;
      bottom: 40px;
      right: 50px;
      width: 180px;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      z-index: 4;
      transition: opacity 0.6s ease;
    }

    /* ── Idle ── */
    .idle-screen {
      position: fixed; inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      background: #0a0a14;
    }
    .idle-text {
      font-size: 2.2rem;
      opacity: 0.35;
      font-weight: 300;
    }

    /* ── Trailer overlay ── */
    .trailer-overlay {
      position: fixed; inset: 0;
      background: #000;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }
    .trailer-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .trailer-overlay iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- BACKDROP -->
  <div class="backdrop" id="backdrop"></div>
  <div class="backdrop-gradient" id="backdrop-gradient"></div>

  <!-- POSTER (floating bottom-right) -->
  <img class="poster-float hidden" id="poster" src="" alt="">

  <!-- CONTENT (left panel) -->
  <div class="content" id="content">
    <div class="show-title" id="title"></div>
    <div class="tagline hidden" id="tagline"></div>

    <div class="meta-row" id="meta-row">
      <span class="cert-badge hidden" id="cert"></span>
      <span id="runtime"></span>
      <span class="separator">•</span>
      <span id="year"></span>
      <span class="separator">•</span>
      <span class="rating-group" id="rating"></span>
      <span class="episode-tag hidden" id="episode-tag"></span>
    </div>

    <!-- Progress bar -->
    <div class="progress-wrap hidden" id="progress-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="progress-times">
        <span id="progress-elapsed">0:00</span>
        <span id="progress-remaining">0:00</span>
      </div>
    </div>

    <div class="section-label" id="genres-label">GENRES</div>
    <div class="pills" id="genres"></div>

    <div class="section-label" id="cast-label">CAST</div>
    <div class="pills" id="cast"></div>

    <div class="credit-line hidden" id="credit-line"></div>

    <div class="section-label" id="summary-label">SUMMARY</div>
    <div class="summary" id="summary"></div>

    <div class="network-line hidden" id="network-line">
      <img class="network-logo hidden" id="network-logo" src="" alt="">
      <span id="network-name"></span>
    </div>
  </div>

  <!-- IDLE -->
  <div class="idle-screen hidden" id="idle">
    <div class="idle-text">Nothing playing right now</div>
  </div>

  <!-- TRAILER OVERLAY -->
  <div class="trailer-overlay" id="trailer-overlay">
    <iframe id="trailer-iframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>

  <script>
    // =====================================================================
    //  CONFIG
    // =====================================================================
    const TRAKT_USERNAME   = "tannorino";
    const TRAKT_CLIENT_ID  = "9e5efaab5af9ff42f947317b83e0089f16dd7bd9b487dc7028dbaa62d5cb66e0";
    const TMDB_API_KEY     = "86341e3584cca1bc1543a57b43d12bd9";
    const POLL_INTERVAL    = 15000;
    const TRAILER_INTERVAL = 5 * 60 * 1000;
    const TRAILER_DURATION = 60 * 1000;

    // =====================================================================
    //  State
    // =====================================================================
    let currentId = null;
    let currentTrailerKey = null;
    let trailerTimer = null;
    let progressTimer = null;
    let missCount = 0;
    const MISS_GRACE = 4;

    // Trakt timestamps for progress bar
    let playStarted = null;
    let playExpires = null;

    const $ = id => document.getElementById(id);

    // =====================================================================
    //  API calls
    // =====================================================================
    async function getTraktWatching() {
      const res = await fetch(
        `https://api.trakt.tv/users/${TRAKT_USERNAME}/watching`, {
          headers: {
            "Content-Type": "application/json",
            "trakt-api-version": "2",
            "trakt-api-key": TRAKT_CLIENT_ID
          }
        }
      );
      if (res.status === 204) return null;
      if (!res.ok) throw new Error(`Trakt ${res.status}`);
      return res.json();
    }

    async function getTmdbDetails(type, tmdbId) {
      const extra = type === "tv"
        ? "credits,videos,content_ratings"
        : "credits,videos,release_dates";
      const res = await fetch(
        `https://api.themoviedb.org/3/${type}/${tmdbId}?api_key=${TMDB_API_KEY}&append_to_response=${extra}`
      );
      if (!res.ok) return null;
      return res.json();
    }

    async function getTmdbEpisode(showTmdbId, season, episode) {
      const res = await fetch(
        `https://api.themoviedb.org/3/tv/${showTmdbId}/season/${season}/episode/${episode}?api_key=${TMDB_API_KEY}&append_to_response=credits`
      );
      if (!res.ok) return null;
      return res.json();
    }

    // =====================================================================
    //  Helpers
    // =====================================================================
    function getCertification(tmdb, type) {
      if (type === "tv") {
        const us = tmdb.content_ratings?.results?.find(r => r.iso_3166_1 === "US");
        return us?.rating || null;
      } else {
        const us = tmdb.release_dates?.results?.find(r => r.iso_3166_1 === "US");
        const cert = us?.release_dates?.find(r => r.certification);
        return cert?.certification || null;
      }
    }

    function getDirector(tmdb, type) {
      if (type === "tv") {
        return tmdb.created_by?.map(c => c.name) || [];
      } else {
        return (tmdb.credits?.crew || [])
          .filter(c => c.job === "Director")
          .map(c => c.name);
      }
    }

    function fmtTime(mins) {
      const h = Math.floor(mins / 60);
      const m = Math.round(mins % 60);
      return h > 0 ? `${h}h ${m}m` : `${m}m`;
    }

    // =====================================================================
    //  Progress bar
    // =====================================================================
    function startProgress() {
      clearInterval(progressTimer);
      if (!playStarted || !playExpires) {
        $("progress-wrap").classList.add("hidden");
        return;
      }
      $("progress-wrap").classList.remove("hidden");
      updateProgress();
      progressTimer = setInterval(updateProgress, 1000);
    }

    function updateProgress() {
      if (!playStarted || !playExpires) return;
      const now     = Date.now();
      const total   = playExpires - playStarted;
      const elapsed = now - playStarted;
      const pct     = Math.min(100, Math.max(0, (elapsed / total) * 100));

      $("progress-fill").style.width = pct + "%";

      const elapsedMin = Math.max(0, elapsed / 60000);
      const remainMin  = Math.max(0, (total - elapsed) / 60000);
      $("progress-elapsed").textContent   = fmtTime(elapsedMin);
      $("progress-remaining").textContent = "-" + fmtTime(remainMin);
    }

    // =====================================================================
    //  Trailer
    // =====================================================================
    function scheduleTrailer() {
      clearTimeout(trailerTimer);
      if (!currentTrailerKey) return;
      trailerTimer = setTimeout(showTrailer, TRAILER_INTERVAL);
    }

    function showTrailer() {
      if (!currentTrailerKey) return;
      $("trailer-iframe").src = `https://www.youtube.com/embed/${currentTrailerKey}?autoplay=1&controls=0&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3`;
      $("trailer-overlay").classList.add("active");
      setTimeout(() => {
        $("trailer-overlay").classList.remove("active");
        setTimeout(() => { $("trailer-iframe").src = ""; }, 800);
        scheduleTrailer();
      }, TRAILER_DURATION);
    }

    // =====================================================================
    //  Render
    // =====================================================================
    function showIdle() {
      currentId = null;
      currentTrailerKey = null;
      playStarted = null;
      playExpires = null;
      clearTimeout(trailerTimer);
      clearInterval(progressTimer);
      $("content").classList.add("hidden");
      $("poster").classList.add("hidden");
      $("backdrop").style.backgroundImage = "";
      $("backdrop-gradient").classList.add("hidden");
      $("idle").classList.remove("hidden");
      $("trailer-overlay").classList.remove("active");
      $("trailer-iframe").src = "";
    }

    function render(data) {
      $("idle").classList.add("hidden");
      $("backdrop-gradient").classList.remove("hidden");

      $("content").style.opacity = "0";
      $("backdrop").style.opacity = "0";
      $("poster").style.opacity  = "0";

      setTimeout(() => {
        // Backdrop
        if (data.backdrop) {
          $("backdrop").style.backgroundImage = `url(${data.backdrop})`;
        }

        // Poster
        if (data.poster) {
          $("poster").src = data.poster;
          $("poster").classList.remove("hidden");
        } else {
          $("poster").classList.add("hidden");
        }

        // Title
        $("title").textContent = data.title || "";

        // Tagline
        const tagEl = $("tagline");
        if (data.tagline) {
          tagEl.textContent = `"${data.tagline}"`;
          tagEl.classList.remove("hidden");
        } else {
          tagEl.classList.add("hidden");
        }

        // Certification
        const certEl = $("cert");
        if (data.certification) {
          certEl.textContent = data.certification;
          certEl.classList.remove("hidden");
        } else {
          certEl.classList.add("hidden");
        }

        // Runtime
        $("runtime").textContent = data.runtime ? fmtTime(data.runtime) : "";

        // Year
        $("year").textContent = data.year
          ? `${data.year}${data.status === "Returning Series" ? "–" : ""}`
          : "";

        // Rating
        const ratingEl = $("rating");
        if (data.rating) {
          ratingEl.innerHTML = `${data.rating.toFixed(1)} <span class="imdb-badge">IMDb</span>`;
        } else {
          ratingEl.innerHTML = "";
        }

        // Episode tag
        const epTag = $("episode-tag");
        if (data.season != null) {
          const s = String(data.season).padStart(2, "0");
          const e = String(data.episode).padStart(2, "0");
          epTag.textContent = `S${s}E${e}${data.episodeTitle ? " · " + data.episodeTitle : ""}`;
          epTag.classList.remove("hidden");
        } else {
          epTag.classList.add("hidden");
        }

        // Genres
        const genresEl = $("genres");
        genresEl.innerHTML = "";
        if (data.genres?.length) {
          data.genres.forEach(g => {
            const span = document.createElement("span");
            span.className = "pill";
            span.textContent = g;
            genresEl.appendChild(span);
          });
          $("genres-label").classList.remove("hidden");
        } else {
          $("genres-label").classList.add("hidden");
        }

        // Cast
        const castEl = $("cast");
        castEl.innerHTML = "";
        if (data.cast?.length) {
          data.cast.forEach(c => {
            const span = document.createElement("span");
            span.className = "pill";
            span.textContent = c.character ? `${c.name} as ${c.character}` : c.name;
            castEl.appendChild(span);
          });
          $("cast-label").classList.remove("hidden");
        } else {
          $("cast-label").classList.add("hidden");
        }

        // Director / Creator
        const creditEl = $("credit-line");
        if (data.directors?.length) {
          const label = data.isTV ? "Created by" : "Directed by";
          creditEl.innerHTML = `${label} <strong>${data.directors.join(", ")}</strong>`;
          creditEl.classList.remove("hidden");
        } else {
          creditEl.classList.add("hidden");
        }

        // Summary
        $("summary").textContent = data.overview || "";
        $("summary-label").style.display = data.overview ? "" : "none";

        // Network / Studio
        const netLine = $("network-line");
        if (data.network) {
          $("network-name").textContent = data.network.name;
          if (data.network.logo) {
            $("network-logo").src = data.network.logo;
            $("network-logo").classList.remove("hidden");
          } else {
            $("network-logo").classList.add("hidden");
          }
          netLine.classList.remove("hidden");
        } else {
          netLine.classList.add("hidden");
        }

        // Show content
        $("content").classList.remove("hidden");

        // Fade in
        requestAnimationFrame(() => {
          $("backdrop").style.opacity = "1";
          $("content").style.opacity  = "1";
          $("poster").style.opacity   = "1";
        });

        // Progress bar
        startProgress();

        // Trailer
        currentTrailerKey = data.trailerKey || null;
        scheduleTrailer();

      }, 400);
    }

    // =====================================================================
    //  Main poll loop
    // =====================================================================
    async function poll() {
      try {
        const trakt = await getTraktWatching();

        if (!trakt || !trakt.type) {
          if (currentId) {
            missCount++;
            if (missCount < MISS_GRACE) return;
          }
          showIdle();
          return;
        }
        missCount = 0;

        const mediaType = trakt.type;
        const item      = trakt[mediaType];
        const show      = trakt.show || null;

        // Dedupe
        const itemId = mediaType === "episode"
          ? `${show?.ids?.trakt}-s${item.season}e${item.number}`
          : `${item.ids?.trakt}`;
        if (itemId === currentId) return;
        currentId = itemId;

        // Store Trakt timestamps for progress bar
        playStarted = trakt.started_at ? new Date(trakt.started_at).getTime() : null;
        playExpires = trakt.expires_at ? new Date(trakt.expires_at).getTime() : null;

        // TMDB
        const tmdbType = mediaType === "episode" ? "tv" : "movie";
        const tmdbId   = mediaType === "episode" ? show?.ids?.tmdb : item.ids?.tmdb;
        if (!tmdbId) { showIdle(); return; }

        const tmdb = await getTmdbDetails(tmdbType, tmdbId);
        if (!tmdb) { showIdle(); return; }

        // Build display
        const display = {
          title:         tmdb.title || tmdb.name || item.title,
          tagline:       tmdb.tagline || null,
          year:          tmdb.release_date?.slice(0,4) || tmdb.first_air_date?.slice(0,4) || item.year,
          runtime:       tmdb.runtime || tmdb.episode_run_time?.[0] || null,
          rating:        tmdb.vote_average || null,
          certification: getCertification(tmdb, tmdbType),
          status:        tmdb.status || null,
          overview:      tmdb.overview || "",
          isTV:          tmdbType === "tv",
          backdrop:      tmdb.backdrop_path ? `https://image.tmdb.org/t/p/original${tmdb.backdrop_path}` : null,
          poster:        tmdb.poster_path   ? `https://image.tmdb.org/t/p/w500${tmdb.poster_path}` : null,
          genres:        (tmdb.genres || []).map(g => g.name),
          directors:     getDirector(tmdb, tmdbType),
          cast:          (tmdb.credits?.cast || []).slice(0, 6).map(a => ({
                           name: a.name,
                           character: a.character || null,
                         })),
          network:       null,
          trailerKey:    null,
          season:        null,
          episode:       null,
          episodeTitle:  null,
        };

        // Network / Studio
        if (tmdb.networks?.length) {
          const net = tmdb.networks[0];
          display.network = {
            name: net.name,
            logo: net.logo_path ? `https://image.tmdb.org/t/p/w92${net.logo_path}` : null,
          };
        } else if (tmdb.production_companies?.length) {
          const co = tmdb.production_companies[0];
          display.network = {
            name: co.name,
            logo: co.logo_path ? `https://image.tmdb.org/t/p/w92${co.logo_path}` : null,
          };
        }

        // Trailer
        if (tmdb.videos?.results) {
          const trailer = tmdb.videos.results.find(v =>
            v.site === "YouTube" && (v.type === "Trailer" || v.type === "Teaser")
          );
          if (trailer) display.trailerKey = trailer.key;
        }

        // Episode-specific
        if (mediaType === "episode") {
          display.season       = item.season;
          display.episode      = item.number;
          display.episodeTitle = item.title;

          const ep = await getTmdbEpisode(show.ids.tmdb, item.season, item.number);
          if (ep) {
            if (ep.overview) display.overview = ep.overview;
            if (ep.runtime)  display.runtime  = ep.runtime;
            // Episode director
            const epDir = (ep.credits?.crew || []).filter(c => c.job === "Director").map(c => c.name);
            if (epDir.length) {
              display.directors = epDir;
              display.isTV = false; // say "Directed by" for episode director
            }
          }
        }

        render(display);

      } catch (err) {
        console.error("[side-tv]", err);
      }
    }

    // =====================================================================
    //  Init
    // =====================================================================
    showIdle();
    poll();
    setInterval(poll, POLL_INTERVAL);

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) poll();
    });
  </script>
</body>
</html>
